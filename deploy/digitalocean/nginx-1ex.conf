# /etc/nginx/sites-available/1ex-api
# Replace __API_*__ placeholders during setup.

upstream ex99_main    { server 127.0.0.1:1456; }
upstream ex99_admin   { server 127.0.0.1:1457; }
upstream ex99_center  { server 127.0.0.1:1458; }
upstream ex99_staff   { server 127.0.0.1:1460; }

server {
    listen 80;
    server_name __API_MAIN__;
    client_max_body_size 25m;

    location / {
        proxy_pass http://ex99_main;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

