# /etc/nginx/sites-available/diaapi
# domain change karo: api.tumhara.com → apna subdomain

upstream diaapi_backend {
    server 127.0.0.1:8080;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name api.tumhara.com;

    # Certbot ke baad HTTPS redirect auto add hoga

    client_max_body_size 10M;

    location / {
        proxy_pass http://diaapi_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Live JSON — cache band (har request fresh)
        proxy_buffering off;
        proxy_read_timeout 60s;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Health check
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
